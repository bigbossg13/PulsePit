name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow one concurrent deployment; cancel in-flight runs on new push
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Repo name used as basePath — update if repo is renamed
          NEXT_PUBLIC_BASE_PATH: /PulsePit
        run: npm run build

      - name: Upload Pages artifact
        # Only upload on pushes to main, not on PRs
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
